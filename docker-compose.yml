services:
  ollama:
    image: ollama/ollama:latest
    container_name: avrc-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - avrc-net

  ollama-pull-qwen:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: ["pull", "qwen2.5-coder:7b"]
    networks:
      - avrc-net

  avrc-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avrc-orchestrator
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - ./output:/app/output
    depends_on:
      ollama:
        condition: service_healthy
      defectdojo-api-tool:
        condition: service_healthy
      pipeline-lint-tool:
        condition: service_healthy
      container-scan-tool:
        condition: service_healthy
      dependency-patch-tool:
        condition: service_healthy
      cve-lookup-tool:
        condition: service_healthy
    networks:
      - avrc-net

  defectdojo-api-tool:
    build:
      context: ./tools/mock_api_service
    environment:
      TOOL_NAME: defectdojo_api_tool
    ports:
      - "4010:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - avrc-net

  pipeline-lint-tool:
